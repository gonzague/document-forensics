glossary:
  - term: "RSID (Revision Save ID)"
    definition: "Unique identifier automatically generated by Microsoft Word at each save session. Each time a user opens a document, modifies it and saves it, a new RSID is added. RSID analysis helps trace the editing history of a document and determine if two documents share a common origin (copied from the same source file)."
  - term: "Dublin Core Metadata (core.xml)"
    definition: "Set of standardized properties stored in the internal core.xml file of an Office document. Includes the original creator, last modifier, creation and modification dates, revision number, title and keywords. This data is often invisible to the user but provides valuable forensic evidence."
  - term: "Extended Properties (app.xml)"
    definition: "Technical metadata stored in app.xml: application used (e.g. Microsoft Word), version, base template, cumulative editing time, page count, words, characters and paragraphs. Editing time is the cumulative total across all sessions the document was open."
  - term: "Revision number"
    definition: "Counter incremented by Word at each save. A high number relative to editing time may indicate frequent or automatic saves. This number helps estimate how many times the document was opened and modified."
  - term: "Editing time (TotalTime)"
    definition: "Cumulative duration, in minutes, during which the document was open in the application. This time accumulates across all editing sessions since the file was created. Note: it also includes idle time if the document remains open."
  - term: "Document ID (w14 / w15)"
    definition: "Unique identifier assigned to the document by Word. The w14 (Word 2010+) is a short hexadecimal identifier. The w15 (Word 2012+) is a full GUID. When two files share the same ID, it proves they were copied from the same source file — the identifier is only assigned once, at initial creation."
  - term: "Template"
    definition: "The template file (.dotm or .dotx) used as a base to create the document. \"Normal.dotm\" is Word's default template. A custom template may indicate the use of a corporate document template."
  - term: "XMP (Extensible Metadata Platform)"
    definition: "Adobe standard for metadata embedded in PDF files. Contains information similar to Dublin Core (author, dates, software) in XML format. Some software adds additional metadata in the XMP block."
  - term: "PDF Producer"
    definition: "Software that generated the final PDF file. Distinct from the \"Creator\" which is the originating software. For example, a scanned document will have the scanner software as Creator and the operating system as Producer (e.g. macOS Quartz PDFContext)."
  - term: "PDF Creator"
    definition: "Software or device that originally produced the content. For a scan, it's the scanner model. For a Word export, it's \"Microsoft Word\". This information helps determine how the PDF was produced."
  - term: "PDF Objects"
    definition: "Internal building blocks of a PDF file: pages, fonts, images, annotations, forms, etc. A high object count may indicate a complex document or one that was modified multiple times. Each incremental modification adds new objects."
