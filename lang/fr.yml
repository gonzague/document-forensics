glossary:
  - term: "RSID (Revision Save ID)"
    definition: "Identifiant unique généré automatiquement par Microsoft Word à chaque session de sauvegarde. Chaque fois qu'un utilisateur ouvre un document, le modifie et le sauvegarde, un nouveau RSID est ajouté. L'analyse des RSID permet de retracer l'historique d'édition du document et de déterminer si deux documents partagent une origine commune (copiés depuis le même fichier source)."
  - term: "Métadonnées Dublin Core (core.xml)"
    definition: "Ensemble de propriétés standardisées stockées dans le fichier interne core.xml d'un document Office. Comprend le créateur original, le dernier modificateur, les dates de création et modification, le numéro de révision, le titre et les mots-clés. Ces données sont souvent invisibles pour l'utilisateur mais constituent une trace forensique précieuse."
  - term: "Propriétés étendues (app.xml)"
    definition: "Métadonnées techniques stockées dans app.xml : application utilisée (ex. Microsoft Word), version, modèle de base (template), temps d'édition cumulé, nombre de pages, mots, caractères et paragraphes. Le temps d'édition est le total cumulé de toutes les sessions d'ouverture du document."
  - term: "Numéro de révision"
    definition: "Compteur incrémenté par Word à chaque sauvegarde du document. Un numéro élevé par rapport au temps d'édition peut indiquer des sauvegardes fréquentes ou automatiques. Ce chiffre permet d'estimer le nombre de fois où le document a été ouvert et modifié."
  - term: "Temps d'édition (TotalTime)"
    definition: "Durée cumulée, en minutes, pendant laquelle le document a été ouvert dans l'application. Ce temps s'additionne à travers toutes les sessions d'édition depuis la création du fichier. Attention : il inclut aussi le temps d'inactivité si le document reste ouvert."
  - term: "ID document (w14 / w15)"
    definition: "Identifiant unique attribué au document par Word. Le w14 (Word 2010+) est un identifiant hexadécimal court. Le w15 (Word 2012+) est un GUID complet. Quand deux fichiers partagent le même ID, cela prouve qu'ils ont été copiés depuis le même fichier source — l'identifiant n'est attribué qu'une seule fois, lors de la première création."
  - term: "Modèle (Template)"
    definition: "Le fichier modèle (.dotm ou .dotx) utilisé comme base pour créer le document. « Normal.dotm » est le modèle par défaut de Word. Un modèle personnalisé peut indiquer l'utilisation d'un gabarit d'entreprise."
  - term: "XMP (Extensible Metadata Platform)"
    definition: "Standard Adobe de métadonnées embarquées dans les fichiers PDF. Contient des informations similaires au Dublin Core (auteur, dates, logiciel) dans un format XML. Certains logiciels ajoutent des métadonnées supplémentaires dans le bloc XMP."
  - term: "Producteur PDF (Producer)"
    definition: "Logiciel ayant généré le fichier PDF final. Distinct du « Créateur » (Creator) qui est le logiciel d'origine. Par exemple, un document scanné aura comme Creator le logiciel du scanner et comme Producer le système d'exploitation qui a assemblé le PDF (ex. macOS Quartz PDFContext)."
  - term: "Créateur PDF (Creator)"
    definition: "Logiciel ou périphérique ayant initialement produit le contenu. Pour un scan, c'est le modèle du scanner. Pour un export depuis Word, c'est « Microsoft Word ». Cette information permet de déterminer le procédé de fabrication du PDF."
  - term: "Objets PDF"
    definition: "Éléments constitutifs internes d'un fichier PDF : pages, polices, images, annotations, formulaires, etc. Un nombre élevé d'objets peut indiquer un document complexe ou modifié plusieurs fois. Chaque modification incrémentale ajoute de nouveaux objets."
